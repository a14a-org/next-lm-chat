name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  merge_group:

# contents: write is required only for the Dependabot lockfile-regen commit below.
permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Dependabot only updates package.json, not bun.lock. Regenerate the
      # lockfile on Dependabot PRs so `--frozen-lockfile` does not drift.
      - name: Install dependencies (regen lockfile for Dependabot)
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Commit regenerated lockfile (Dependabot only)
        if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request'
        run: |
          if ! git diff --quiet bun.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add bun.lock
            git commit -m "chore: regenerate bun.lock"
            git push
          fi

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Verify build artifacts
        run: |
          if [ ! -d ".next" ]; then
            echo "Build failed - .next directory not found"
            exit 1
          fi
          echo "Build successful"

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Smoke tests
        run: bun run test:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
